name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-sanity:
    name: Repository sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pyyaml
      - run: python scripts/validate_repo.py

  semgrep-pack:
    name: Semgrep pack baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip semgrep
      - run: |
          semgrep --config rules/semgrep/backend-craft.yml \
            --no-git-ignore --exclude node_modules --quiet --json fixtures > semgrep.json || true
          python - <<'PY'
          import json
          data = json.load(open("semgrep.json", encoding="utf-8"))
          errors = data.get("errors", [])
          if errors:
              raise SystemExit(f"Semgrep parse/config errors: {errors}")
          count = len(data.get("results", []))
          if count != 11:
              raise SystemExit(f"expected 11 Semgrep findings in fixtures, got {count}")
          print("semgrep baseline ok: 11 findings")
          PY

  python-fixture:
    name: Python FastAPI fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: python -m pip install --upgrade pip uv
      - run: uv run pytest -q
        working-directory: fixtures/python-fastapi

  go-fixture:
    name: Go HTTP fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: fixtures/go-http/go.mod
      - run: go vet ./...
        working-directory: fixtures/go-http
      - run: go test ./...
        working-directory: fixtures/go-http

  typescript-fixture:
    name: TypeScript Fastify fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - run: npm install -g pnpm@10
      - run: pnpm install --frozen-lockfile
        working-directory: fixtures/ts-fastify
      - run: pnpm typecheck
        working-directory: fixtures/ts-fastify
      - run: pnpm test
        working-directory: fixtures/ts-fastify

  hook:
    name: Hook acceptance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: python -m pip install --upgrade pip uv
      - run: hooks/test-hook.sh
