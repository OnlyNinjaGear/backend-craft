name: Real backend case
description: Turn a real bug, PR review, incident, or agent miss into a backend-craft candidate.
title: "[case] "
labels: ["case", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for real backend failures or review findings. Remove private data first.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? Keep it short.
      placeholder: "An agent added a mutating endpoint. Client retries created duplicate orders."
    validations:
      required: true
  - type: input
    id: stack
    attributes:
      label: Stack
      placeholder: "FastAPI + Postgres, Go net/http, Fastify + MongoDB..."
    validations:
      required: true
  - type: textarea
    id: failure_mode
    attributes:
      label: Failure mode
      description: What repeatable backend mistake does this show?
      placeholder: "Mutation accepted retries without an idempotency key or duplicate-safe write."
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Link to public issue/PR/postmortem or paste an anonymized reducer.
    validations:
      required: true
  - type: textarea
    id: verifier
    attributes:
      label: Verifier idea
      description: How can this be proven?
      placeholder: "Test: send the same request twice with the same idempotency key and assert one side effect."
    validations:
      required: true
  - type: dropdown
    id: artifact
    attributes:
      label: Best target artifact
      options:
        - Existing failure card update
        - New failure card
        - Fixture
        - Checker
        - Playbook/reference step
        - Not sure
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed company names, credentials, PII, private URLs, and customer data.
          required: true
        - label: I checked existing failure cards for duplicates.
          required: true
